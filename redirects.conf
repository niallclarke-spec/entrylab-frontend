# --- Generic catch-all for any remaining /popular_broker/ or /popular-broker/ URLs ---
# Handled by Node.js/Express (which does slug resolution), but this ensures
# Nginx doesn't serve a 404 before the request reaches Node.

location ~* ^/popular[_-]broker/ {
    proxy_pass http://localhost:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
